version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: catalog-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - catalog-network

  redis:
    image: redis:7-alpine
    container_name: catalog-redis
    ports:
      - "6379:6379"
    networks:
      - catalog-network

  backend:
    build: .
    container_name: catalog-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/product_catalog
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - JWT_SECRET=supersecretjwtsecretkey123456!
    depends_on:
      - mongodb
      - redis
    networks:
      - catalog-network

  proxy:
    build: .
    container_name: catalog-proxy
    command: node proxy/proxy-server.js
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - BACKEND_TARGETS=http://backend:5000
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - catalog-network

volumes:
  mongo-data:

networks:
  catalog-network:
    driver: bridge
